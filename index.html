```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div id="app" class="container mt-5">

        <h1 class="text-center mb-5">Members</h1>

        <!-- Authentication -->
        <div class="card shadow p-4 mb-4">

            <h2 class="mb-4">Authentication</h2>

            <div v-if="!loggedIn">

                <div class="row g-2">

                    <div class="col-md-4">
                        <input class="form-control" v-model="auth.username" placeholder="Username" type="text">
                    </div>

                    <div class="col-md-4">
                        <input class="form-control" v-model="auth.password" placeholder="Password" type="password">
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" @click="login">
                            Login
                        </button>
                    </div>

                </div>

                <p class="text-danger mt-3" v-if="authMessage">
                    {{ authMessage }}
                </p>

            </div>

            <div v-else>

                <div class="d-flex justify-content-between align-items-center">

                    <p class="mb-0">
                        Logged in as <strong>{{ auth.username }}</strong>,
                        role: <strong>{{ role }}</strong>
                    </p>

                    <button class="btn btn-danger" @click="logout">
                        Logout
                    </button>

                </div>

            </div>

        </div>

        <!-- Members -->
        <div v-if="loggedIn" class="card shadow p-4 mb-4">

            <h2 class="mb-4">Members</h2>

            <button class="btn btn-success mb-4" v-on:click="getAll">
                Get All Members
            </button>

            <ul class="list-group">

                <member-item v-for="member in members" :key="member.id" :member="member">
                </member-item>

            </ul>

        </div>

        <!-- Add Member -->
        <div v-if="role === 'Admin'" class="card shadow p-4 mb-4">

            <h2 class="mb-4">Add a new member</h2>

            <div class="row g-2">

                <div class="col-md-3">
                    <input class="form-control" v-model="adddata.name" placeholder="Name">
                </div>

                <div class="col-md-3">
                    <input class="form-control" v-model="adddata.address" placeholder="Address">
                </div>

                <div class="col-md-3">
                    <input class="form-control" v-model="adddata.birthYear" placeholder="Birth Year">
                </div>

                <div class="col-md-3">
                    <button class="btn btn-primary w-100" v-on:click="add">
                        Add Member
                    </button>
                </div>

            </div>

        </div>

        <!-- Update Member -->
        <div v-if="role === 'Admin'" class="card shadow p-4 mb-4">

            <h2 class="mb-4">Update a member</h2>

            <div class="row g-2">

                <div class="col-md-3">
                    <input class="form-control" v-model="updateData.id" placeholder="ID of member to update">
                </div>

                <div class="col-md-3">
                    <input class="form-control" v-model="updateData.name" placeholder="New Name">
                </div>

                <div class="col-md-3">
                    <input class="form-control" v-model="updateData.address" placeholder="New Address">
                </div>

                <div class="col-md-3">
                    <input class="form-control" v-model="updateData.birthYear" placeholder="New Birth Year">
                </div>

            </div>

            <button class="btn btn-warning mt-3" v-on:click="update">
                Update Member
            </button>

            <p class="text-success mt-3" v-if="updateMessage">
                {{ updateMessage }}
            </p>

        </div>

        <!-- Delete Member -->
        <div v-if="role === 'Admin'" class="card shadow p-4 mb-4">

            <h2 class="mb-4">Delete Member</h2>

            <div class="row g-2">

                <div class="col-md-4">
                    <input class="form-control" v-model.number="deleteId" placeholder="Member ID to delete"
                        type="number" />
                </div>

                <div class="col-md-3">
                    <button class="btn btn-danger w-100" v-on:click="deleteMember(deleteId)">
                        Delete Member
                    </button>
                </div>

            </div>

            <p class="text-success mt-3" v-if="deleteMessage">
                {{ deleteMessage }}
            </p>

        </div>

    </div>

    <script src="index.js"></script>

</body>

</html>
```
